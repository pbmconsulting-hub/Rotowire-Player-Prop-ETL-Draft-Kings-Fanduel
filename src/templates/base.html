<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NBA Props Dashboard{% endblock %}</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #242836;
            --border: #2e3348;
            --text: #e4e6f0;
            --text-dim: #8b8fa3;
            --accent: #6c63ff;
            --accent-hover: #5a52d5;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
            --blue: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 60px;
            gap: 2rem;
        }
        nav .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
        }
        nav .logo span { color: var(--text); }
        nav a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.5rem 0;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        nav a:hover, nav a.active {
            color: var(--text);
            border-bottom-color: var(--accent);
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        h2 { font-size: 1.2rem; margin-bottom: 0.75rem; color: var(--text-dim); font-weight: 500; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
        }
        .stat-card .label { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; margin-top: 0.25rem; }
        .stat-card .value.success { color: var(--green); }
        .stat-card .value.danger { color: var(--red); }
        .stat-card .value.warning { color: var(--yellow); }
        .stat-card .value.info { color: var(--blue); }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .filter-group { display: flex; flex-direction: column; gap: 0.25rem; }
        .filter-group label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
        input, select {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            outline: none;
        }
        input:focus, select:focus { border-color: var(--accent); }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-success { background: var(--green); color: white; }
        .btn-success:hover { opacity: 0.9; }
        .btn-danger { background: var(--red); color: white; }
        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        thead { position: sticky; top: 0; z-index: 1; }
        th {
            background: var(--surface2);
            padding: 0.6rem 0.75rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        tr:hover td { background: var(--surface2); }
        .table-scroll { overflow-x: auto; max-height: 600px; overflow-y: auto; }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-success { background: rgba(34, 197, 94, 0.15); color: var(--green); }
        .badge-danger { background: rgba(239, 68, 68, 0.15); color: var(--red); }
        .badge-warning { background: rgba(234, 179, 8, 0.15); color: var(--yellow); }
        .badge-info { background: rgba(59, 130, 246, 0.15); color: var(--blue); }

        .positive { color: var(--green); }
        .negative { color: var(--red); }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
        }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
        .alert-success { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); color: var(--green); }
        .alert-danger { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: var(--red); }
        .alert-info { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); color: var(--blue); }

        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-1 { gap: 1rem; }
        .mb-1 { margin-bottom: 1rem; }

        @media (max-width: 768px) {
            nav { padding: 0 1rem; gap: 1rem; overflow-x: auto; }
            .container { padding: 1rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">🏀 <span>NBA Props</span></a>
        <a href="/" {% if active_page == 'home' %}class="active"{% endif %}>Dashboard</a>
        <a href="/props" {% if active_page == 'props' %}class="active"{% endif %}>Current Props</a>
        <a href="/compare" {% if active_page == 'compare' %}class="active"{% endif %}>DK vs FD</a>
        <a href="/edges" {% if active_page == 'edges' %}class="active"{% endif %}>Edges</a>
        <a href="/movements" {% if active_page == 'movements' %}class="active"{% endif %}>Line Movements</a>
        <a href="/runs" {% if active_page == 'runs' %}class="active"{% endif %}>Scrape Runs</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
